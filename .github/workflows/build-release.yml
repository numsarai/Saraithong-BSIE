# Triggered by: git tag v1.0.0 && git push --tags
# Produces: BSIE-Setup-{version}-windows.exe + BSIE-{version}-macos.dmg
# Both uploaded to a GitHub Release.

name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller bsie.spec --noconfirm

      - name: Smoke test Windows bundle
        shell: pwsh
        run: |
          python scripts\smoke_bundle.py `
            --target dist\BSIE\BSIE.exe `
            --port 8761 `
            --user-data-dir "$env:RUNNER_TEMP\bsie-smoke"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content installer\windows\setup.iss) -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"$version`"" | Set-Content installer\windows\setup.iss
          New-Item -ItemType Directory -Force -Path dist\installer
          ISCC installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/BSIE-Setup-*-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller bsie.spec --noconfirm

      - name: Smoke test macOS bundle
        run: |
          python scripts/smoke_bundle.py \
            --target dist/BSIE.app \
            --port 8761 \
            --user-data-dir "$RUNNER_TEMP/bsie-smoke"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS DMG
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          bash installer/macos/build_dmg.sh "$version"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/BSIE-*-macos.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
