name: Semgrep Security Scan

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "dist/**"
      - "data/**"
      - "frontend/dist/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "dist/**"
      - "data/**"
      - "frontend/dist/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/default \
            --exclude .venv \
            --exclude dist \
            --exclude data \
            --exclude frontend/dist \
            --exclude frontend/node_modules \
            --sarif \
            --output semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
