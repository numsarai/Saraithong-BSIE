services:
  postgres:
    image: postgres:16
    container_name: bsie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsie
      POSTGRES_USER: bsie
      POSTGRES_PASSWORD: bsie
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsie -d bsie"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - bsie_postgres_data:/var/lib/postgresql/data

volumes:
  bsie_postgres_data:
